<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Buyer Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#fff8f6]">

<div class="max-w-4xl mx-auto p-6">

<!-- Header -->

<div class="flex items-center gap-4 mb-8">

<a
href="/public/designs/buyer_dashboard_agrolink_nigeria.html"
class="w-10 h-10 rounded-full bg-white shadow flex items-center justify-center"
>

<span class="material-symbols-outlined">

arrow_back

</span>

</a>

<h1 class="text-3xl font-bold text-green-700">

My Profile

</h1>

</div>


<!-- Profile Card -->

<div class="bg-white rounded-2xl shadow p-8">

<div class="flex flex-col items-center">

<div class="w-28 h-28 rounded-full overflow-hidden">

<img id="profile-image"
src="https://images.unsplash.com/photo-1494790108377-be9c29b2933"
class="w-full h-full object-cover"
>

</div>

<h2 id="buyer-name" class="text-2xl font-bold mt-4">

Buyer Name

</h2>

<p id="buyer-role-location" class="text-gray-500">

Buyer • Not set

</p>

</div>


<div class="grid md:grid-cols-2 gap-6 mt-8">

<div class="bg-green-50 p-5 rounded-xl">

<div class="flex items-center gap-2">

<span class="material-symbols-outlined text-green-700">
mail
</span>

<h3 class="font-bold">
Email
</h3>

</div>

<p id="buyer-email" class="mt-2 text-gray-600">
example@agrolink.ng
</p>

</div>


<div class="bg-green-50 p-5 rounded-xl">

<div class="flex items-center gap-2">

<span class="material-symbols-outlined text-green-700">
call
</span>

<h3 class="font-bold">
Phone
</h3>

</div>

<p id="buyer-phone" class="mt-2 text-gray-600">
Not added yet
</p>

</div>


<div class="bg-green-50 p-5 rounded-xl">

<div class="flex items-center gap-2">

<span class="material-symbols-outlined text-green-700">
shopping_bag
</span>

<h3 class="font-bold">
Orders
</h3>

</div>

<p id="buyer-orders" class="mt-2 text-gray-600">
0 Orders
</p>

</div>


<div class="bg-green-50 p-5 rounded-xl">

<div class="flex items-center gap-2">

<span class="material-symbols-outlined text-green-700">
favorite
</span>

<h3 class="font-bold">
Wishlist
</h3>

</div>

<p id="buyer-wishlist" class="mt-2 text-gray-600">
0 Saved Products
</p>

</div>

</div>


<div id="edit-profile-form" class="hidden mt-8 bg-white rounded-2xl shadow p-6 border border-green-100">
  <h2 class="text-xl font-bold text-green-700 mb-4">Update Your Profile</h2>
  <form id="profile-form" class="grid gap-4 sm:grid-cols-2" onsubmit="saveBuyerProfile(event)">
    <div class="sm:col-span-2">
      <label class="block text-sm font-semibold text-gray-700 mb-2" for="input-name">Full Name</label>
      <input id="input-name" class="w-full rounded-xl border border-gray-300 px-4 py-3" type="text" required />
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2" for="input-email">Email Address</label>
      <input id="input-email" class="w-full rounded-xl border border-gray-300 px-4 py-3" type="email" required />
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2" for="input-phone">Phone</label>
      <input id="input-phone" class="w-full rounded-xl border border-gray-300 px-4 py-3" type="tel" placeholder="e.g. +234 8012345678" />
    </div>
    <div class="sm:col-span-2">
      <label class="block text-sm font-semibold text-gray-700 mb-2" for="input-location">Location</label>
      <input id="input-location" class="w-full rounded-xl border border-gray-300 px-4 py-3" type="text" placeholder="Lagos, Nigeria" />
    </div>
    <div class="sm:col-span-2 flex justify-end gap-3">
      <button type="button" onclick="toggleEditForm()" class="border border-gray-300 text-gray-700 px-6 py-3 rounded-lg">Cancel</button>
      <button type="submit" class="bg-green-700 text-white px-6 py-3 rounded-lg">Save Profile</button>
    </div>
  </form>
</div>

<div class="mt-8 flex gap-4">

<button type="button" onclick="toggleEditForm()"
class="bg-green-700 text-white px-6 py-3 rounded-lg"
>

Edit Profile

</button>


<button type="button" onclick="clearBuyerProfile()"
class="border border-red-500 text-red-500 px-6 py-3 rounded-lg"
>

Logout

</button>

</div>

</div>

</div>

<script>
const defaultBuyerDetails = {
  name: 'Buyer Name',
  email: 'example@agrolink.ng',
  phone: 'Not added yet',
  location: 'Not set',
  orders: 0,
  wishlist: 0,
  role: 'Buyer',
};

function getBuyerDetails() {
  return JSON.parse(localStorage.getItem('buyerProfile')) || {};
}

function setBuyerDetails(details) {
  localStorage.setItem('buyerProfile', JSON.stringify(details));
}

function formatOrders(value) {
  return value != null ? `${value} Orders` : `${defaultBuyerDetails.orders} Orders`;
}

function formatWishlist(value) {
  return value != null ? `${value} Saved Products` : `${defaultBuyerDetails.wishlist} Saved Products`;
}

function loadBuyerProfile() {
  const data = getBuyerDetails();

  document.getElementById('buyer-name').innerText = data.name || defaultBuyerDetails.name;
  document.getElementById('buyer-email').innerText = data.email || defaultBuyerDetails.email;
  document.getElementById('buyer-phone').innerText = data.phone || defaultBuyerDetails.phone;
  document.getElementById('buyer-orders').innerText = formatOrders(data.orders);
  document.getElementById('buyer-wishlist').innerText = formatWishlist(data.wishlist);
  document.getElementById('buyer-role-location').innerText = `${defaultBuyerDetails.role} • ${data.location || defaultBuyerDetails.location}`;

  if (data.image) {
    document.getElementById('profile-image').src = data.image;
  }

  document.getElementById('input-name').value = data.name || '';
  document.getElementById('input-email').value = data.email || '';
  document.getElementById('input-phone').value = data.phone || '';
  document.getElementById('input-location').value = data.location || '';
}

function toggleEditForm() {
  document.getElementById('edit-profile-form').classList.toggle('hidden');
}

function saveBuyerProfile(event) {
  event.preventDefault();

  const name = document.getElementById('input-name').value.trim();
  const email = document.getElementById('input-email').value.trim();
  const phone = document.getElementById('input-phone').value.trim();
  const location = document.getElementById('input-location').value.trim();

  const data = {
    ...getBuyerDetails(),
    name,
    email,
    phone,
    location,
  };

  setBuyerDetails(data);
  
  // Also save userName for dashboard consistency
  localStorage.setItem('userName', name);
  
  loadBuyerProfile();
  toggleEditForm();
}

function clearBuyerProfile() {
  localStorage.removeItem('buyerProfile');
  window.location.href = '/public/designs/login_sign_up_agrolink_nigeria.html';
}

document.addEventListener('DOMContentLoaded', loadBuyerProfile);
</script>

</body>
</html>
